<!DOCTYPE html>
<html>
<head>
<title>DVRUO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Sora&family=Manrope&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>DVRUO 🚀</h1>

  <!-- STATS -->
  <div class="stats">
    <div><h2 id="branch-count">0</h2><p>Branches</p></div>
    <div><h2 id="provider-count">0</h2><p>Providers</p></div>
    <div><h2 id="test-count">0</h2><p>Tests</p></div>
  </div>

  <!-- STEP 1 -->
  <h3>Branch</h3>
  <div id="branch-grid" class="grid"></div>

  <!-- STEP 2 -->
  <div id="provider-section" class="hidden">
    <h3>Academy</h3>
    <div id="provider-chips" class="chips"></div>
  </div>

  <!-- STEP 3 -->
  <div id="series-section" class="hidden">
    <h3>Series</h3>
    <div id="series-grid" class="grid"></div>
  </div>

  <!-- STEP 4 -->
  <div id="tests-section" class="hidden">
    <h3>Tests</h3>

    <div class="chips">
      <div class="chip filter-chip active" onclick="setFilter('all',this)">All</div>
      <div class="chip filter-chip" onclick="setFilter('mock',this)">Mock</div>
      <div class="chip filter-chip" onclick="setFilter('basic',this)">Basic</div>
      <div class="chip filter-chip" onclick="setFilter('advance',this)">Advance</div>
      <div class="chip filter-chip" onclick="setFilter('subject',this)">Subject</div>
    </div>

    <div id="tests-list" class="grid"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
