<!DOCTYPE html>
<html>
<head>
<title>Tests</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #020617;
  color: white;
  padding: 15px;
}

.header {
  margin-bottom: 15px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.test {
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.test:hover {
  background: #1e40af;
}
</style>
</head>

<body>

<div class="header">
  <div class="title" id="title"></div>
</div>

<div id="tests"></div>

<script>
const params = new URLSearchParams(window.location.search);
const academy = params.get("academy");
const branch = params.get("branch");

document.getElementById("title").innerText = academy + " - " + branch;

fetch("/api/tests")
.then(res => res.json())
.then(data => {
  const found = data.find(a => a.academy === academy);
  const branchData = found.branches.find(b => b.branch === branch);

  const container = document.getElementById("tests");

  branchData.tests.forEach(test => {
    container.innerHTML += `
      <div class="test" onclick="openTest('${test}')">
        ${test.replace(".html","")}
      </div>
    `;
  });
});

function openTest(test){
  window.open(`/tests/${academy}/${branch}/${test}`, "_blank");
}
</script>

</body>
</html>
