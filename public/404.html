<!DOCTYPE html>
<html>
<head>
<title>Page Not Found</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg,#020617,#0f172a);
  font-family: 'Segoe UI';
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.card {
  background: rgba(30,41,59,0.7);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1 {
  font-size: 60px;
  margin: 0;
  color: #38bdf8;
}

p {
  margin: 10px 0 20px;
  color: #cbd5f5;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>404</h1>
  <p>Oops! Page not found or internet issue 🚫</p>
  <button onclick="location.href='/'">Go Home</button>
</div>

</body>
</html>
